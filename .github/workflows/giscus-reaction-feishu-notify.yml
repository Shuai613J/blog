# Giscus Reaction 通知（点赞/取消点赞推送飞书）
name: Giscus Reaction 通知
on:
  reaction:
    types: [created, deleted]  # 监听Reaction的创建/删除事件
    # 限定仅监听Discussions相关的Reaction（排除Issue/PR的Reaction）
    branches-ignore: ['*']
    paths-ignore: ['*']

jobs:
  send-reaction-notify:
    runs-on: ubuntu-latest
    steps:
      - name: 推送Reaction通知到飞书
        env:
          # 从GitHub Secrets读取飞书配置
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_BOT_SIGNKEY }}
        run: |
          set -e
          
          # 1. 生成实时UTC时间戳（避免签名过期）
          TIMESTAMP=$(date +%s)

          # 2. 复刻Java签名逻辑（飞书非标准签名）
          SIGN_STRING="${TIMESTAMP}"$'\n'"${FEISHU_SECRET}"
          KEY=$(echo -n "${SIGN_STRING}" | xxd -p -c 256)
          SIGN=$(echo -n "" | openssl dgst -sha256 -mac HMAC -macopt hexkey:"${KEY}" -binary | base64 -w 0)

          # 3. 解析Reaction事件数据
          # 转换Reaction类型为中文+Emoji（比如+1→👍，eyes→👀）
          case "${{ github.event.reaction.content }}" in
            "+1") REACTION_EMOJI="👍"; REACTION_TEXT="点赞" ;;
            "eyes") REACTION_EMOJI="👀"; REACTION_TEXT="已查看" ;;
            "laugh") REACTION_EMOJI="😆"; REACTION_TEXT="大笑" ;;
            "confused") REACTION_EMOJI="😕"; REACTION_TEXT="困惑" ;;
            "heart") REACTION_EMOJI="❤️"; REACTION_TEXT="爱心" ;;
            "hooray") REACTION_EMOJI="🎉"; REACTION_TEXT="庆祝" ;;
            "rocket") REACTION_EMOJI="🚀"; REACTION_TEXT="火箭" ;;
            "thumbsdown") REACTION_EMOJI="👎"; REACTION_TEXT="点踩" ;;
            *) REACTION_EMOJI="😐"; REACTION_TEXT="未知表情" ;;
          esac

          # 判断是添加还是取消Reaction
          if [[ "${{ github.event.action }}" == "created" ]]; then
            ACTION_TEXT="添加了"
            ACTION_EMOJI="✅"
          else
            ACTION_TEXT="取消了"
            ACTION_EMOJI="❌"
          fi

          # 提取相关信息（区分是讨论还是评论的Reaction）
          ACTOR_NAME="${{ github.event.sender.login }}"  # 操作人
          if [[ "${{ github.event.reaction.subject.type }}" == "Discussion" ]]; then
            # 讨论的Reaction
            TARGET_TITLE="${{ github.event.reaction.subject.title }}"
            TARGET_URL="${{ github.event.reaction.subject.html_url }}"
            TARGET_TYPE="讨论《${TARGET_TITLE}》"
          elif [[ "${{ github.event.reaction.subject.type }}" == "Comment" ]]; then
            # 评论的Reaction
            TARGET_URL="${{ github.event.reaction.subject.html_url }}"
            # 截取评论前50字作为摘要
            COMMENT_BODY=$(echo "${{ github.event.reaction.subject.body }}" | sed 's/"/\\"/g' | cut -c 1-50)
            TARGET_TYPE="评论（内容：${COMMENT_BODY}...）"
          else
            TARGET_TYPE="未知内容"
            TARGET_URL=""
          fi

          # 4. 构造飞书消息体（支持Emoji+清晰排版）
          FEISHU_MESSAGE=$(cat << EOF
          {
            "msg_type": "text",
            "content": {
              "text": "<at id=\"all\">所有人</at> ${ACTION_EMOJI} ${ACTOR_NAME} ${ACTION_TEXT} ${REACTION_EMOJI}${REACTION_TEXT}\\n目标：${TARGET_TYPE}\\n链接：${TARGET_URL}"
            },
            "timestamp": "${TIMESTAMP}",
            "sign": "${SIGN}"
          }
          EOF
          )

          # 5. 静默推送至飞书
          curl -s -X POST "${FEISHU_WEBHOOK}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "Accept-Charset: utf-8" \
            -d "${FEISHU_MESSAGE}" > /dev/null 2>&1
