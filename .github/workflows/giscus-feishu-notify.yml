# Giscus评论转发到飞书（@所有人+飞书官方签名规则）
name: Giscus to Feishu Notify
on:
  discussion_comment:
    types: [created]

jobs:
  send-to-feishu:
    runs-on: ubuntu-latest
    steps:
      - name: Send Feishu Notification
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_BOT_SIGNKEY }}
        run: |
          # ========== 步骤1：生成飞书要求的「UTC秒级时间戳」（核心！无时区偏移）==========
          # 飞书文档明确：timestamp是UTC秒级，无需+8小时，否则会超出1小时有效期
          # TIMESTAMP=$(date +%s)
          TIMESTAMP=1773296507
          echo -n "${FEISHU_SECRET}"
          SIGN1=$(printf "%s\n%s" "${TIMESTAMP}" "${FEISHU_SECRET}" | openssl dgst -sha256 -hmac "${FEISHU_SECRET}" -binary | base64 -w 0)
          SIGN2=$(echo -e "${TIMESTAMP}\n${FEISHU_SECRET}" | openssl dgst -sha256 -hmac "${FEISHU_SECRET}" -binary | base64 -w 0)
          SIGN3=$(cat /tmp/sign.txt | openssl dgst -sha256 -hmac "${FEISHU_SECRET}" -binary | base64 -w 0)
          echo "方式1签名：${SIGN1}"
          echo "方式2签名：${SIGN2}"
          echo "方式3签名：${SIGN3}"
          echo "正确签名：+MKwSr9ncJB8zJx1Dt4aBqZjUbYbS0vyDknDF7qLHpE="
          
          
          # ========== 步骤2：严格按飞书规则计算签名（3个关键修正）==========
          # 修正1：用$'\n'生成真实换行（而非字符串转义）
          # 修正2：base64 -w 0 禁用换行（飞书要求标准无换行Base64）
          # 修正3：echo -n 确保无多余空格/换行
          SIGN=$(echo -n "${TIMESTAMP}"$'\n'"${FEISHU_SECRET}" | openssl dgst -sha256 -hmac "${FEISHU_SECRET}" -binary | base64 -w 0)
          
          # ========== 步骤3：构造消息体（处理特殊字符，避免JSON格式错误）==========
          # 提取并转义评论内容中的特殊字符（双引号、换行），防止JSON解析失败
          DISCUSSION_TITLE=$(echo "${{ github.event.discussion.title }}" | sed 's/"/\\"/g')
          COMMENT_AUTHOR=$(echo "${{ github.event.comment.user.login }}" | sed 's/"/\\"/g')
          COMMENT_CONTENT=$(echo "${{ github.event.comment.body }}" | sed 's/"/\\"/g' | sed 's/\n/\\n/g' | cut -c 1-200)
          COMMENT_URL=$(echo "${{ github.event.comment.html_url }}" | sed 's/"/\\"/g')
          
          # 飞书@所有人语法 + 严格JSON格式（转义内部换行）
          FEISHU_MESSAGE=$(cat << EOF
          {
            "msg_type": "text",
            "content": {
              "text": "<at id=\"all\">所有人</at> 📝 博客新评论\\n页面：${DISCUSSION_TITLE}\\n评论人：${COMMENT_AUTHOR}\\n内容：${COMMENT_CONTENT}\\n链接：${COMMENT_URL}"
            },
            "timestamp": "${TIMESTAMP}",
            "sign": "${SIGN}"
          }
          EOF
          )
          
          # ========== 步骤4：发送请求（带完整调试日志）==========
          echo "=== 调试信息（核对飞书规则）==="
          echo "UTC时间戳（飞书要求）：${TIMESTAMP}"
          echo "签名字符串（原始）：${TIMESTAMP}"$'\n'"${FEISHU_SECRET}"
          echo "生成的签名：${SIGN}"
          echo "最终发送的JSON：${FEISHU_MESSAGE}"
          
          # 发送并捕获完整响应（-v 打印详细请求/响应，便于定位）
          echo "=== 发送请求到飞书 ==="
          RESPONSE=$(curl -v -X POST "${FEISHU_WEBHOOK}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "${FEISHU_MESSAGE}" 2>&1)
          
          # 打印飞书完整响应
          echo "=== 飞书响应结果 ==="
          echo "${RESPONSE}"
