# 终极版：和Java HmacSHA256 100%对齐
name: Giscus飞书推送（Java同款签名）
on:
  workflow_dispatch: # 手动触发
  discussion_comment:
    types: [created]

jobs:
  send-feishu:
    runs-on: ubuntu-latest
    steps:
      - name: 推送评论到飞书
        run: |
          set -e
          
          # ========== 第一步：你的真实配置 ==========
          FEISHU_WEBHOOK="https://open.feishu.cn/open-apis/bot/v2/hook/f90fc8ba-6a0e-421d-b8a7-ec6f532a6960"
          FEISHU_SECRET="GIJFId8iWvEvpxmEfyLeed"
          TIMESTAMP="1773296507"

          # ========== 第二步：修正后的签名逻辑（核心！） ==========
          # 错误原因：之前少了 -binary 参数的正确位置 + 算法对齐
          SIGN=$(echo -n "${TIMESTAMP}"$'\n'"${FEISHU_SECRET}" | openssl sha256 -hmac "${FEISHU_SECRET}" -binary | base64 -w 0)

          # ========== 第三步：打印对比 ==========
          echo "=== 签名对比 ==="
          echo "时间戳: ${TIMESTAMP}"
          echo "密钥: ${FEISHU_SECRET}"
          echo "签名字符串（十六进制）: $(echo -n "${TIMESTAMP}"$'\n'"${FEISHU_SECRET}" | xxd)"
          echo "Shell生成签名: ${SIGN}"
          echo "Java正确签名: +MKwSr9ncJB8zJx1Dt4aBqZjUbYbS0vyDknDF7qLHpE="

          # ========== 第四步：构造消息并发送 ==========
          DISCUSSION_TITLE=$(echo "${{ github.event.discussion.title }}" | sed 's/"/\\"/g' | sed 's/\n/\\n/g')
          COMMENT_AUTHOR=$(echo "${{ github.event.comment.user.login }}" | sed 's/"/\\"/g')
          COMMENT_CONTENT=$(echo "${{ github.event.comment.body }}" | sed 's/"/\\"/g' | sed 's/\n/\\n/g' | cut -c 1-200)
          COMMENT_URL=$(echo "${{ github.event.comment.html_url }}" | sed 's/"/\\"/g')

          FEISHU_MESSAGE=$(cat << EOF
          {
            "msg_type": "text",
            "content": {
              "text": "<at id=\"all\">所有人</at> 📝 博客新评论\\n页面：${DISCUSSION_TITLE}\\n评论人：${COMMENT_AUTHOR}\\n内容：${COMMENT_CONTENT}\\n链接：${COMMENT_URL}"
            },
            "timestamp": "${TIMESTAMP}",
            "sign": "${SIGN}"
          }
          EOF
          )

          # 发送请求
          echo "=== 发送消息 ==="
          RESPONSE=$(curl -v -X POST "${FEISHU_WEBHOOK}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "${FEISHU_MESSAGE}" 2>&1)
          echo "飞书响应: ${RESPONSE}"
