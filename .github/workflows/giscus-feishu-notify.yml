# Giscus评论推送飞书（纯自动生产版）
name: Giscus飞书推送
on:
  discussion_comment:
    types: [created]

jobs:
  send-feishu:
    runs-on: ubuntu-latest
    steps:
      - name: 推送评论内容到飞书
        env:
          # 从GitHub Secrets读取配置（需提前配置）
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_BOT_SIGNKEY }}
        run: |
          set -e
          
          # 生成实时UTC时间戳（避免过期）
          TIMESTAMP=$(date +%s)

          # 签名逻辑
          SIGN_STRING="${TIMESTAMP}"$'\n'"${FEISHU_SECRET}"
          KEY=$(echo -n "${SIGN_STRING}" | xxd -p -c 256)
          SIGN=$(echo -n "" | openssl dgst -sha256 -mac HMAC -macopt hexkey:"${KEY}" -binary | base64 -w 0)

          # 处理评论内容特殊字符
          DISCUSSION_TITLE=$(echo "${{ github.event.discussion.title }}" | sed 's/"/\\"/g' | sed 's/\n/\\n/g')
          COMMENT_AUTHOR=$(echo "${{ github.event.comment.user.login }}" | sed 's/"/\\"/g')
          COMMENT_CONTENT=$(echo "${{ github.event.comment.body }}" | sed 's/"/\\"/g' | sed 's/\n/\\n/g' | cut -c 1-200)
          COMMENT_URL=$(echo "${{ github.event.comment.html_url }}" | sed 's/"/\\"/g')

          # 构造消息体
          FEISHU_MESSAGE=$(cat << EOF
          {
            "msg_type": "text",
            "content": {
              "text": "<at id=\"all\">所有人</at> 📝 博客新评论\\n页面：${DISCUSSION_TITLE}\\n评论人：${COMMENT_AUTHOR}\\n内容：${COMMENT_CONTENT}\\n链接：${COMMENT_URL}"
            },
            "timestamp": "${TIMESTAMP}",
            "sign": "${SIGN}"
          }
          EOF
          )

          # 静默发送请求
          curl -s -X POST "${FEISHU_WEBHOOK}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "${FEISHU_MESSAGE}" > /dev/null 2>&1
