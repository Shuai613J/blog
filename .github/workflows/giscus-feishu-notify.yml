# Giscus评论转发到飞书（@所有人+Node.js crypto签名+无文件写入）
name: Giscus to Feishu Notify
on:
  discussion_comment:
    types: [created]
  workflow_dispatch: # 手动触发测试

jobs:
  send-to-feishu:
    runs-on: ubuntu-latest
    steps:
      - name: Send Feishu Notification
        env:
          FEISHU_WEBHOOK: 'https://open.feishu.cn/open-apis/bot/v2/hook/f90fc8ba-6a0e-421d-b8a7-ec6f532a6960'
          FEISHU_SECRET: 'GIJFId8iWvEvpxmEfyLeed'
          TEST_TIMESTAMP: 1773296507 # 固定测试时间戳，可注释使用实时值
          # Giscus评论信息
          DISCUSSION_TITLE: ${{ github.event.discussion.title }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_CONTENT: ${{ github.event.comment.body }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
        run: |
          set -e
          
          # ========== 步骤1：内联执行Node.js生成签名和消息体（无文件写入）==========
          echo "=== 执行Node.js签名逻辑 ==="
          RESULT=$(node -e "
          const crypto = require('crypto');
          
          // 读取环境变量
          const secret = process.env.FEISHU_SECRET;
          const testTimestamp = process.env.TEST_TIMESTAMP;
          
          // 1. 生成UTC秒级时间戳
          const timestamp = testTimestamp || Math.floor(Date.now() / 1000).toString();
          
          // 2. 飞书官方签名逻辑
          const signString = \`\${timestamp}\\n\${secret}\`;
          const sign = crypto.createHmac('sha256', secret)
            .update(signString, 'utf8')
            .digest('base64');
          
          // 3. 处理特殊字符
          function escapeSpecialChars(str) {
            if (!str) return '';
            return str.replace(/\"/g, '\\\\\"').replace(/\\n/g, '\\\\n');
          }
          const discussionTitle = escapeSpecialChars(process.env.DISCUSSION_TITLE);
          const commentAuthor = escapeSpecialChars(process.env.COMMENT_AUTHOR);
          const commentContent = escapeSpecialChars(process.env.COMMENT_CONTENT).substring(0, 200);
          const commentUrl = escapeSpecialChars(process.env.COMMENT_URL);
          
          // 4. 构造消息体
          const feishuMessage = {
            msg_type: 'text',
            content: {
              text: \`<at id=\"all\">所有人</at> 📝 博客新评论\\\\n页面：\${discussionTitle}\\\\n评论人：\${commentAuthor}\\\\n内容：\${commentContent}\\\\n链接：\${commentUrl}\`
            },
            timestamp: timestamp,
            sign: sign
          };
          
          // 输出JSON结果（供Shell解析）
          console.log(JSON.stringify({
            timestamp: timestamp,
            sign: sign,
            signString: signString,
            message: feishuMessage
          }));
          ")
          
          # ========== 步骤2：解析Node.js输出结果 ==========
          TIMESTAMP=$(echo "$RESULT" | jq -r '.timestamp')
          SIGN=$(echo "$RESULT" | jq -r '.sign')
          SIGN_STRING=$(echo "$RESULT" | jq -r '.signString')
          FEISHU_MESSAGE=$(echo "$RESULT" | jq -r '.message | tojson')
          
          # ========== 步骤3：打印调试信息 ==========
          echo "=== 调试信息 ==="
          echo "FEISHU_WEBHOOK：${FEISHU_WEBHOOK}"
          echo "FEISHU_SECRET：${FEISHU_SECRET}"
          echo "UTC时间戳：${TIMESTAMP}"
          echo "签名字符串：${SIGN_STRING}"
          echo "生成的签名：${SIGN}"
          echo "正确签名：+MKwSr9ncJB8zJx1Dt4aBqZjUbYbS0vyDknDF7qLHpE="
          echo "飞书消息体：${FEISHU_MESSAGE}"
          
          # ========== 步骤4：发送请求到飞书 ==========
          echo "=== 发送请求到飞书 ==="
          RESPONSE=$(curl -v -X POST "${FEISHU_WEBHOOK}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "${FEISHU_MESSAGE}" 2>&1)
          
          # 打印完整响应
          echo "=== 飞书响应结果 ==="
          echo "${RESPONSE}"
